name: ci
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * *'

jobs:
  test_oss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout RiscV-Formal
        uses: actions/checkout@v4

      - name: Install oss-cad-suite
        uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync CLI
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv sync --frozen --directory cli

      - name: Run checks
        run: |
          source cli/.venv/bin/activate
          make -C cores/nerv check -j$(nproc)
          make -C cores/picorv32 check -j$(nproc)

  test_verific:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout RiscV-Formal
        uses: actions/checkout@v4

      - name: Checkout Yosys
        uses: actions/checkout@v4
        with:
          repository: 'YosysHQ/yosys'
          path: 'yosys'
          submodules: true

      - name: Runtime environment
        run: |
          echo "procs=$(nproc)" >> $GITHUB_ENV

      - name: Build Yosys
        run: |
          cd yosys
          make config-clang
          echo "ENABLE_VERIFIC := 1" >> Makefile.conf
          echo "ENABLE_VERIFIC_EDIF := 1" >> Makefile.conf
          echo "ENABLE_VERIFIC_LIBERTY := 1" >> Makefile.conf
          echo "ENABLE_VERIFIC_YOSYSHQ_EXTENSIONS := 1" >> Makefile.conf
          echo "ENABLE_CCACHE := 1" >> Makefile.conf
          make -j${{ env.procs }}
          make install DESTDIR=${GITHUB_WORKSPACE}/.local PREFIX=

      - name: Checkout SBY
        uses: actions/checkout@v4
        with:
          repository: 'YosysHQ/sby'
          path: 'sby'

      - name: Build SBY
        run: |
          make -C sby install DESTDIR=${GITHUB_WORKSPACE}/.local PREFIX=

      - name: Sync CLI
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv sync --frozen --directory cli

      - name: Run checks
        run: |
          source cli/.venv/bin/activate
          make -C cores/nerv check -j$(nproc)
          make -C cores/picorv32 check -j$(nproc)
