[options]
isa rv32i

[depth]
reg 1 3

# reg_ch0 is also valid for CLI but not script
[defines reg]
`define NERV_RVFI

[verilog-files]
@basedir@/cores/@core@/wrapper.sv
@basedir@/cores/@core@/@core@.sv

# causes SBY to fail, but not applied to reg
[script-defines ill]
logger -expect error "No such command" 1

[script-link]
exit
