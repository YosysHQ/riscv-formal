[options]
isa rv32im
nret 2
solver bitwuzla

[depth]
insn            8
reg       1     8
pc_fwd    1     8
pc_bwd    1     8
unique    1     4   8
causal    1     8

[filter-checks]
- insn_(lb|lh|lbu|lhu|sb|sh|jalr|div|divu|rem|remu)_ch[01]
- ill_ch[01]

[script-defines]
verilog_defaults -add -I@basedir@/cores/@core@/ridecore-src/src/fpga

[defines]
`define DEBUGNETS

